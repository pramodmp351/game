<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="STACKLY - Page Not Found" />
    <title>404 | STACKLY</title>
    <link rel="icon" type="image/webp" href="./assets/logo.webp" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0b0d17;
        --bg-secondary: #121622;
        --bg-card: #1a2032;
        --accent: #7c5cff;
        --accent-light: #a992ff;
        --pink: #ff3cac;
        --text: #f5f7fa;
        --text-light: #b8c1d1;
        --border: rgba(255, 255, 255, 0.08);
        --radius: 1.25rem;
        --radius-sm: 0.75rem;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        scroll-behavior: smooth;
        font-size: 16px;
      }
      body {
        font-family: "Poppins", sans-serif;
        background: var(--bg-primary);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
        text-align: center;
        overflow-x: hidden;
        position: relative;
      }

      .bg-glow {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(124, 92, 255, 0.15) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
        filter: blur(60px);
        z-index: 0;
      }

      .container {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 600px;
      }

      .logo {
        width: 80px;
        height: 80px;
        margin: 0 auto 2rem;
        filter: drop-shadow(0 0 16px var(--accent));
      }

      .glitch-text {
        font-family: "Orbitron", sans-serif;
        font-weight: 900;
        font-size: clamp(5rem, 15vw, 10rem);
        color: var(--accent);
        position: relative;
        line-height: 1;
        margin-bottom: 0.5rem;
        text-shadow:
          2px 2px 0 var(--pink),
          -2px -2px 0 var(--cyan);
        animation: glitch 2s infinite;
      }

      @keyframes glitch {
        0%,
        100% {
          text-shadow:
            2px 2px 0 var(--pink),
            -2px -2px 0 var(--cyan);
        }
        25% {
          text-shadow:
            -2px -2px 0 var(--pink),
            2px 2px 0 var(--cyan);
        }
        50% {
          text-shadow:
            2px -2px 0 var(--pink),
            -2px 2px 0 var(--cyan);
        }
        75% {
          text-shadow:
            -2px 2px 0 var(--pink),
            2px -2px 0 var(--cyan);
        }
      }

      h2 {
        font-family: "Orbitron", sans-serif;
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 1rem;
        color: var(--text);
      }

      p {
        color: var(--text-light);
        font-size: 1.1rem;
        margin-bottom: 2rem;
        max-width: 500px;
        margin-left: auto;
        margin-right: auto;
      }

      .btn-home {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-family: "Orbitron", sans-serif;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        padding: 1rem 2.5rem;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, var(--accent) 0%, var(--pink) 100%);
        color: white;
        text-decoration: none;
        box-shadow: 0 4px 20px rgba(124, 92, 255, 0.4);
        transition: all 0.3s ease;
        font-size: 1.1rem;
      }

      .btn-home:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(124, 92, 255, 0.7);
      }

      .floating-icons {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .float {
        position: absolute;
        font-size: 2rem;
        opacity: 0.2;
        animation: floatUp 8s infinite ease-in-out;
      }

      .float:nth-child(1) {
        top: 10%;
        left: 5%;
        animation-delay: 0s;
      }
      .float:nth-child(2) {
        top: 20%;
        right: 10%;
        animation-delay: 1s;
      }
      .float:nth-child(3) {
        bottom: 15%;
        left: 10%;
        animation-delay: 2s;
      }
      .float:nth-child(4) {
        bottom: 20%;
        right: 8%;
        animation-delay: 3s;
      }
      .float:nth-child(5) {
        top: 50%;
        left: 2%;
        animation-delay: 4s;
      }
      .float:nth-child(6) {
        top: 30%;
        right: 3%;
        animation-delay: 5s;
      }

      @keyframes floatUp {
        0%,
        100% {
          transform: translateY(0) rotate(0deg);
        }
        50% {
          transform: translateY(-30px) rotate(5deg);
        }
      }

      @media (max-width: 480px) {
        .btn-home {
          padding: 0.9rem 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="floating-icons" aria-hidden="true">
      <div class="float">🎮</div>
      <div class="float">🕹️</div>
      <div class="float">⌨️</div>
      <div class="float">🎧</div>
      <div class="float">💻</div>
      <div class="float">🖱️</div>
    </div>

    <div class="container">
      <img src="./assets/logo.webp" alt="STACKLY Logo" class="logo" />
      <div class="glitch-text">404</div>
      <h2>Game Over</h2>
      <p>
        The page you're looking for has been disconnected. Maybe it never
        existed, or it's been moved to another server.
      </p>
      <a href="index.html" class="btn-home">🏠 Back to Home</a>
    </div>
  </body>
</html>
